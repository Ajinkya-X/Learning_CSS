<head>

    <style>
.bglinear{
    border: 7px solid black;

    height: 300px;
    color: white;

}
.bglinear2{
    border: 7px solid black;

    background: linear-gradient(red,white)
}
.radient{
    border: 7px solid black;
    font-size: 550px;
    height: 800px;
    color: black;
    background: radial-gradient(orange,white,lightgreen);
}
.conic_ex
{
    border: 7px solid black;
    font-size: 550px;
    height: 800px;
    color: black;
    background:conic-gradient(red,blue,yellow);
  
}

</head>
<body>

</html>
